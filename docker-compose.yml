services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    profiles: ["app"]
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp?schema=public
      REDIS_URL: redis://redis:6379
      WEBHOOK_SIGNING_SECRETS_JSON: ${WEBHOOK_SIGNING_SECRETS_JSON:?Webhook signing secrets must be set}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET must be set}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    profiles: ["app"]
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    profiles: ["app"]
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://erp:erp@postgres:5432/erp?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: erp
      POSTGRES_PASSWORD: erp
      POSTGRES_DB: erp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp -d erp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: erpminio
      MINIO_ROOT_PASSWORD: erpminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
